<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07111F;color:#cce;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{padding:8px 14px;background:#0c1a2b;border-bottom:1px solid #1e3a5f;display:flex;flex-wrap:wrap;gap:10px;align-items:center;flex-shrink:0}
#header h1{font-size:14px;color:#7eb8e8;font-weight:600;white-space:nowrap;margin-right:6px}
.tabs{display:flex;gap:4px}
.tab{padding:4px 12px;border-radius:4px;cursor:pointer;border:1px solid #1e3a5f;color:#88aacc;font-size:12px;transition:all .15s}
.tab.active{background:#1a3a6b;color:#7eb8e8;border-color:#3a7abf}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex:1;min-width:0}
.ck-label{display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;font-size:12px;padding:3px 8px;border-radius:3px;border:1px solid #1a3a5f;color:#99bbdd;transition:background .15s}
.ck-label:hover{background:#122030}
.ck-label input{accent-color:#4a9ee0;width:13px;height:13px}
select{background:#0c1a2b;color:#88aacc;border:1px solid #1e3a5f;border-radius:3px;padding:3px 7px;font-size:12px;outline:none}
select:focus{border-color:#3a7abf}
#fitbtn{padding:4px 10px;background:#1a3a6b;color:#7eb8e8;border:1px solid #3a7abf;border-radius:3px;cursor:pointer;font-size:12px}
#fitbtn:hover{background:#234d8a}
#infobar{padding:5px 14px;background:#0a1622;border-bottom:1px solid #152a40;font-size:11px;color:#5580aa;display:flex;gap:16px;flex-shrink:0}
#infobar span{color:#88aacc}
#canvas-wrap{flex:1;overflow:hidden;cursor:grab;position:relative}
#canvas-wrap.dragging{cursor:grabbing}
#tooltip{position:fixed;background:#0a1a2e;border:1px solid #2a5080;color:#bbd8f5;padding:5px 9px;font-size:11px;line-height:1.5;border-radius:4px;pointer-events:none;white-space:pre;display:none;z-index:100}
</style>
</head>

// ── 坐标变换 ──────────────────────────────────────────────────────────────
const {xmin,xmax,ymin,ymax} = DATA.bbox;
const W=xmax-xmin, H=ymax-ymin;
const MARGIN=6;
function fitScale(){
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  return Math.min((cw-MARGIN*2)/W,(ch-MARGIN*2)/H)*0.96;
}
function fitViewport(){
  const sc=fitScale();
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  vp={sc,x:(cw-W*sc)/2,y:(ch-H*sc)/2};
}
// PCB → screen
function px(x,y){return {sx:vp.x+(x-xmin)*vp.sc, sy:vp.y+(ymax-y)*vp.sc};}
function pxPts(pts){return pts.map(([x,y])=>{const {sx,sy}=px(x,y);return `${sx},${sy}`;}).join(" ");}

// ── SVG 元素创建 ──────────────────────────────────────────────────────────
function el(tag,attrs,parent){
  const e=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}

// ── 颜色：按 y 在板内位置映射颜色 ─────────────────────────────────────────
function laneColor(y){
  // y 在 [ymin, ymax] 之间，归一化到 [0,1]
  const t=(y-ymin)/(ymax-ymin); // 0=底部, 1=顶部
  // 顶部(t接近1): 暖色 红/橙/黄
  // 底部(t接近0): 冷色 蓝/青/绿
  if(t>0.5){
    // 暖色带: red(0°) → orange(30°) → yellow(60°)
    const u=(t-0.5)/0.5;
    const hue = 0 + u*60; // 0=红, 60=黄
    return `hsl(${hue},90%,62%)`;
  } else {
    // 冷色带: blue(220°) → cyan(180°) → green(140°)
    const u=t/0.5;
    const hue = 220 - u*80; // 220=蓝, 140=绿
    return `hsl(${hue},85%,62%)`;
  }
}

  }

  // 可行域
  if(ck("ck-feasible")&&ld.feasible){
    el("polygon",{points:pxPts(ld.feasible),fill:"#143a5e",
        "fill-opacity":"0.35",stroke:"#2a7abf","stroke-width":"0.8",
        "vector-effect":"non-scaling-stroke"},gFeasible);
  }

  // 扇出区
  if(ck("ck-fanout")){
    const fz = DATA.fanout[currentLayer]||[];
    fz.forEach((z,i)=>{
      const colors=["#c0392b","#e67e22","#8e44ad","#27ae60","#2980b9"];
      const c=colors[i%colors.length];
      const pg=el("polygon",{points:pxPts(z.coords),fill:c,
          "fill-opacity":"0.20",stroke:c,"stroke-width":"0.8",
          "stroke-dasharray":"4,3","vector-effect":"non-scaling-stroke"},gFanout);
      pg.dataset.info=`扇出区 C${z.label}\n引脚数: ${z.n_pins}\n网络: ${(z.nets||[]).slice(0,5).join(", ")}`;
      pg.addEventListener("mouseenter",showTip);
      pg.addEventListener("mouseleave",hideTip);
      pg.addEventListener("mousemove",moveTip);
    });
  }

  // 水平条带 lanes
  if(ck("ck-lanes")){
    const lanes = DATA.lanes[currentLayer]||[];
    lanes.forEach(lane=>{
      const {sx:x0s,sy:ys}=px(lane.x0,lane.y);
      const {sx:x1s}=px(lane.x1,lane.y);
      const color=laneColor(lane.y);
      el("line",{x1:x0s,y1:ys,x2:x1s,y2:ys,stroke:color,
          "stroke-width":"0.85","stroke-opacity":"0.75",
          "vector-effect":"non-scaling-stroke"},gLanes);
    });
  }

  // 障碍物
  if(ck("ck-obstacles")){
    ld.obstacles.forEach(o=>{
      let fill,opacity;
      if(selNet){
        if(o.net===selNet){fill="#00e676";opacity=0.6;}
        else{fill="#e53935";opacity=0.25;}
      } else {fill="#e53935";opacity=0.45;}
      const pg=el("polygon",{points:pxPts(o.pts),fill,
          "fill-opacity":opacity,stroke:fill,"stroke-width":"0.5",
          "vector-effect":"non-scaling-stroke"},gObstacles);
      pg.dataset.info=`净网: ${o.net||"—"}\n位号: ${o.refdes||"—"}\n引脚: ${o.pin||"—"}`;
      pg.addEventListener("mouseenter",showTip);
      pg.addEventListener("mouseleave",hideTip);
      pg.addEventListener("mousemove",moveTip);
    });
  }

  // 引脚
  if(ck("ck-pins")){
    ld.pins.forEach(p=>{
      const {sx,sy}=px(p.x,p.y);
      const c=(!selNet||p.net===selNet)?"#00e676":"#5588aa";
      el("circle",{cx:sx,cy:sy,r:"3",fill:c,"fill-opacity":"0.7"},gPins);
    });
  }

  updateInfobar();
}

function clearGroups(){
  [gBoard,gFeasible,gFanout,gLanes,gObstacles,gPins].forEach(g=>{
    while(g.firstChild)g.removeChild(g.firstChild);
  });
}

function updateInfobar(){
  const ld=DATA.layers[currentLayer];
  document.getElementById("inf-layer").textContent=currentLayer;
  document.getElementById("inf-area").textContent=(ld.area_mm2||"—");
  const lanes=DATA.lanes[currentLayer]||[];
  document.getElementById("inf-lanes").textContent=lanes.length;
  // 瓶颈: 最小活跃数
  const {xmin:bx0,xmax:bx1}=DATA.bbox;
  const xMid=(bx0+bx1)/2;
  const active=lanes.filter(l=>l.x0<=xMid&&l.x1>=xMid).length;
  document.getElementById("inf-bottle").textContent=active+" (x="+xMid.toFixed(0)+"mm)";
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function showTip(e){if(e.target.dataset.info)tooltip.style.display="block";}
function hideTip(){tooltip.style.display="none";}
function moveTip(e){
  tooltip.textContent=e.target.dataset.info||"";
  tooltip.style.left=(e.clientX+14)+"px";
  tooltip.style.top=(e.clientY-8)+"px";
}

// ── Pan/Zoom ──────────────────────────────────────────────────────────────
wrap.addEventListener("wheel",e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.12:0.89;
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
  vp.x=cx-(cx-vp.x)*factor;
  vp.y=cy-(cy-vp.y)*factor;
  vp.sc*=factor;
  render();
},{passive:false});
wrap.addEventListener("mousedown",e=>{
  isDragging=true;wrap.classList.add("dragging");
  dragStart={x:e.clientX,y:e.clientY};vpStart={x:vp.x,y:vp.y};
});
window.addEventListener("mousemove",e=>{
  if(!isDragging) return;
  vp.x=vpStart.x+(e.clientX-dragStart.x);
  vp.y=vpStart.y+(e.clientY-dragStart.y);
  render();
});
window.addEventListener("mouseup",()=>{isDragging=false;wrap.classList.remove("dragging");});

// ── 图层标签 ──────────────────────────────────────────────────────────────
const tabsEl=document.getElementById("layerTabs");
LAYERS_ORDER.forEach(L=>{
  const t=document.createElement("div");
  t.className="tab"+(L===currentLayer?" active":"");
  t.textContent=L;
  t.onclick=()=>{
    currentLayer=L;
    tabsEl.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    render();
  };
  tabsEl.appendChild(t);
});

// 网络下拉
const sel=document.getElementById("netSel");
DATA.all_nets.forEach(n=>{
  const o=document.createElement("option");o.value=n;o.textContent=n;sel.appendChild(o);
});
sel.onchange=render;

// 勾选框
["ck-boundary","ck-feasible","ck-fanout","ck-lanes","ck-obstacles","ck-pins"]
  .forEach(id=>document.getElementById(id).onchange=render);

// Fit 按钮
document.getElementById("fitbtn").onclick=()=>{fitViewport();render();};

// 窗口调整
window.addEventListener("resize",()=>{fitViewport();buildSVG();render();});

// 初始化
buildSVG();
fitViewport();
render();
</script>
</body>
