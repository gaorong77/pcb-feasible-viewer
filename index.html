const LO=["TOP","ART02","ART03","BOTTOM"];
let CL="TOP",vp={x:0,y:0,s:1},drag=false,ds={x:0,y:0},vs={x:0,y:0};
const svg=document.getElementById("svg"),cw=document.getElementById("cw"),tt=document.getElementById("tt");
const {xmin,xmax,ymin,ymax}=D.bbox;
const W=xmax-xmin,H=ymax-ymin;

function fitS(){const r=cw.getBoundingClientRect();return Math.min((r.width-16)/W,(r.height-16)/H)*0.95;}
function fitVP(){const r=cw.getBoundingClientRect(),s=fitS();vp={s,x:(r.width-W*s)/2,y:(r.height-H*s)/2};}
function tx(x){return vp.x+(x-xmin)*vp.s;}
function ty(y){return vp.y+(ymax-y)*vp.s;}
function pp(pts){return pts.map(([x,y])=>`${tx(x)},${ty(y)}`).join(" ");}

const NS="http://www.w3.org/2000/svg";
function e(t,a,p){const n=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))n.setAttribute(k,v);p&&p.appendChild(n);return n;}

// 纵向管道颜色：从外(青绿)到内(蓝紫)
function longColor(i,n){
  const t=i/Math.max(n-1,1);
  return `hsl(${(160+t*100).toFixed(0)},${(80-t*8).toFixed(0)}%,${(68-t*20).toFixed(0)}%)`;
}

let gBd,gFs,gFo,gLP,gTP,gOb,gPi;
function initSVG(){
  svg.innerHTML="";
  const r=cw.getBoundingClientRect();
  svg.setAttribute("width",r.width);svg.setAttribute("height",r.height);
  gBd=e("g",{},svg);gFs=e("g",{},svg);gFo=e("g",{},svg);
  gLP=e("g",{},svg);gTP=e("g",{},svg);gOb=e("g",{},svg);gPi=e("g",{},svg);
}
function clr(){[gBd,gFs,gFo,gLP,gTP,gOb,gPi].forEach(g=>{while(g.firstChild)g.removeChild(g.firstChild);});}
function ck(id){return document.getElementById(id).checked;}

function render(){
  const r=cw.getBoundingClientRect();
  svg.setAttribute("width",r.width);svg.setAttribute("height",r.height);
  clr();
  const ld=D.layers[CL], pd=D.pipes[CL]||{}, sel=document.getElementById("ns").value;

  // 板框
  if(ck("c0")) e("polygon",{points:pp(D.board),fill:"none",stroke:"#4a8abb","stroke-width":"1","vector-effect":"non-scaling-stroke"},gBd);

  // 可行域
  if(ck("c1")&&ld.feasible) e("polygon",{points:pp(ld.feasible),fill:"#0e2e50","fill-opacity":"0.45",stroke:"#2a7abf","stroke-width":"0.7","vector-effect":"non-scaling-stroke"},gFs);

  // 扇出区
  if(ck("c2")){
    const pal=["#c0392b","#e67e22","#8e44ad","#27ae60","#2980b9"];
    (D.fanout[CL]||[]).forEach((z,i)=>{
      const c=pal[i%pal.length],g=e("polygon",{points:pp(z.coords),fill:c,"fill-opacity":"0.16",stroke:c,"stroke-width":"0.9","stroke-dasharray":"5,3","vector-effect":"non-scaling-stroke"},gFo);
      g.dataset.info=`扇出区 C${z.label}  n=${z.n_pins}\n网络: ${(z.nets||[]).slice(0,6).join(", ")}`;
      g.addEventListener("mouseenter",stt);g.addEventListener("mouseleave",htt);g.addEventListener("mousemove",mtt);
    });
  }

  // 纵向管道
  if(ck("c3")){
    const lp=pd.long||[],n=new Set(lp.map(r=>r.ring)).size;
    lp.forEach(r=>{
      const c=longColor(r.ring,n);
      const g=e("polygon",{points:pp(r.pts),fill:"none",stroke:c,"stroke-width":"0.85","stroke-opacity":"0.8","vector-effect":"non-scaling-stroke"},gLP);
      g.dataset.info=`纵向管道 ring ${r.ring}  d=${r.d}mm`;
      g.addEventListener("mouseenter",stt);g.addEventListener("mouseleave",htt);g.addEventListener("mousemove",mtt);
    });
  }

  // 横向管道
  if(ck("c4")){
    (pd.trans||[]).forEach(t=>{
      // 上边 warm(橙)，下边 cool(青)
      const c=t.side==="top"?"rgba(255,160,60,0.65)":"rgba(60,180,220,0.65)";
      if(!t.pts||t.pts.length<2)return;
      const pts=t.pts.map(([x,y])=>`${tx(x)},${ty(y)}`).join(" ");
      const g=e("polyline",{points:pts,fill:"none",stroke:c,"stroke-width":"0.85","stroke-linecap":"round","vector-effect":"non-scaling-stroke"},gTP);
      g.dataset.info=`横向管道 x=${t.x}mm  ${t.side==="top"?"上边缘":"下边缘"}`;
      g.addEventListener("mouseenter",stt);g.addEventListener("mouseleave",htt);g.addEventListener("mousemove",mtt);
    });
  }

  // 障碍物
  if(ck("c5")){
    ld.obstacles.forEach(o=>{
      let fl,op;
      if(sel){fl=o.net===sel?"#00e676":"#e53935";op=o.net===sel?0.6:0.2;}
      else{fl="#e53935";op=0.42;}
      const g=e("polygon",{points:pp(o.pts),fill:fl,"fill-opacity":op,stroke:fl,"stroke-width":"0.5","vector-effect":"non-scaling-stroke"},gOb);
      g.dataset.info=`净网: ${o.net||"—"}\n位号: ${o.refdes||"—"}  引脚: ${o.pin||"—"}`;
      g.addEventListener("mouseenter",stt);g.addEventListener("mouseleave",htt);g.addEventListener("mousemove",mtt);
    });
  }

  // 引脚
  if(ck("c6")){
    ld.pins.forEach(p=>{
      const c=(!sel||p.net===sel)?"#00e676":"#2a5070";
      e("circle",{cx:tx(p.x),cy:ty(p.y),r:"3",fill:c,"fill-opacity":"0.75"},gPi);
    });
  }

  // 信息栏
  const pd2=D.pipes[CL]||{};
  document.getElementById("il").textContent=CL;
  document.getElementById("ia").textContent=ld.area_mm2||"—";
  document.getElementById("iL").textContent=new Set((pd2.long||[]).map(r=>r.ring)).size;
  document.getElementById("iT").textContent=(pd2.trans||[]).length;
}

// tooltip
function stt(e){if(e.target.dataset.info)tt.style.display="block";}
function htt(){tt.style.display="none";}
function mtt(e){tt.textContent=e.target.dataset.info||"";tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-8)+"px";}

// pan/zoom
cw.addEventListener("wheel",e=>{
  e.preventDefault();const f=e.deltaY<0?1.12:0.89;
  const r=cw.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  vp.x=cx-(cx-vp.x)*f;vp.y=cy-(cy-vp.y)*f;vp.s*=f;render();
},{passive:false});
cw.addEventListener("mousedown",e=>{drag=true;cw.classList.add("drag");ds={x:e.clientX,y:e.clientY};vs={x:vp.x,y:vp.y};});
window.addEventListener("mousemove",e=>{if(!drag)return;vp.x=vs.x+(e.clientX-ds.x);vp.y=vs.y+(e.clientY-ds.y);render();});
window.addEventListener("mouseup",()=>{drag=false;cw.classList.remove("drag");});

// 图层标签
const tabsEl=document.getElementById("tabs");
LO.forEach(L=>{
  const t=document.createElement("div");t.className="tab"+(L===CL?" active":"");t.textContent=L;
  t.onclick=()=>{CL=L;tabsEl.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");render();};
  tabsEl.appendChild(t);
});
