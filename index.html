      if(sel&&sel!==rt.net)return;
      const p0=rt.pts[0],pN=rt.pts[rt.pts.length-1];
      el("circle",{cx:tx(p0[0]),cy:ty(p0[1]),r:"4",fill:rt.color,"fill-opacity":"0.9",stroke:"#fff","stroke-width":"0.5"},gRt);
      el("rect",{x:tx(pN[0])-3,y:ty(pN[1])-3,width:"6",height:"6",fill:"none",stroke:rt.color,"stroke-width":"1.2","vector-effect":"non-scaling-stroke"},gRt);
    });
  }
  if(ck("c5")){
    ld.obstacles.forEach(o=>{
      let fl,op;
      if(sel){fl=o.net===sel?"#00e676":"#e53935";op=o.net===sel?0.65:0.15;}
      else{fl="#e53935";op=0.38;}
      const g=el("polygon",{points:pp(o.pts),fill:fl,"fill-opacity":op,stroke:fl,"stroke-width":"0.5","vector-effect":"non-scaling-stroke"},gOb);
      g.dataset.info=`${o.net||"—"}  ${o.refdes||""}`;
      g.addEventListener("mouseenter",stt);g.addEventListener("mouseleave",htt);g.addEventListener("mousemove",mtt);
    });
  }
  if(ck("c6")) ld.pins.forEach(p=>{
    const c=(!sel||p.net===sel)?"#00e676":"#1e4060";
    el("circle",{cx:tx(p.x),cy:ty(p.y),r:"3",fill:c,"fill-opacity":"0.8"},gPi);
  });
  updateInfobar();
}

function updateInfobar(){
  const rs=D.rings[CL]||[],st=D.route_stats||{};
  document.getElementById("il").textContent=CL;
  document.getElementById("ia").textContent=D.layers[CL].area_mm2||"—";
  document.getElementById("iR").textContent=new Set(rs.map(r=>r.ring)).size;
  document.getElementById("iN").textContent=CL===D.route_layer
    ?`${st.ok}/${st.total} (失败:${(st.failed||[]).join(",")||"无"})`: "—";
  const leg=document.getElementById("leg");leg.innerHTML="";
  if(CL===D.route_layer) D.routes.forEach(rt=>{
    const item=document.createElement("span");item.className="litem";
    item.innerHTML=`<span class="ldot" style="background:${rt.color}"></span>${rt.net}`;
    item.onclick=()=>{document.getElementById("ns").value=rt.net;render();};
    leg.appendChild(item);
  });
}

function stt(e){if(e.target.dataset.info)tt.style.display="block";}
function htt(){tt.style.display="none";}
function mtt(e){tt.textContent=e.target.dataset.info||"";tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-8)+"px";}

cw.addEventListener("wheel",e=>{
  e.preventDefault();const f=e.deltaY<0?1.12:0.89;
  const r=cw.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  vp.x=cx-(cx-vp.x)*f;vp.y=cy-(cy-vp.y)*f;vp.s*=f;render();
},{passive:false});
cw.addEventListener("mousedown",e=>{drag=true;cw.classList.add("drag");ds={x:e.clientX,y:e.clientY};vs={x:vp.x,y:vp.y};});
window.addEventListener("mousemove",e=>{if(!drag)return;vp.x=vs.x+(e.clientX-ds.x);vp.y=vs.y+(e.clientY-ds.y);render();});
window.addEventListener("mouseup",()=>{drag=false;cw.classList.remove("drag");});

const tabsEl=document.getElementById("tabs");
LO.forEach(L=>{
  const t=document.createElement("div");t.className="tab"+(L===CL?" active":"");t.textContent=L;
  t.onclick=()=>{CL=L;tabsEl.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");render();};
  tabsEl.appendChild(t);
});
const ns=document.getElementById("ns");
D.all_nets.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;ns.appendChild(o);});
ns.onchange=render;
["c0","c1","c2","c3","c4","c5","c6"].forEach(id=>document.getElementById(id).onchange=render);
document.getElementById("fit").onclick=()=>{fitVP();render();};
document.getElementById("clr").onclick=()=>{document.getElementById("ns").value="";render();};
window.addEventListener("resize",()=>{fitVP();initSVG();render();});
initSVG();fitVP();render();
</script></body></html>
