7,"dist":5.394,"ok":true,"in_board":true,"col":"#a3e635"},{"cx":84.5656,"cy":94.21915,"net":"CAM1_DVDD_0P9V","cluster":3,"ring":29,"ix":90.3926,"iy":94.9906,"dist":5.8778,"ok":false,"in_board":false,"col":"#fbbf24"}],"routes":[{"net":"I2S1_MOSI_SYS_AR1","layer":"BOTTOM","color":"#f472b6","line_w":0.075,"pts":[[225.7327,102.7323],[225.7327,103.0323],[222.4327,104.3823],[218.7577,105.2823],[210.6577,106.8573],[201.7327,108.2073],[194.0827,109.1073],[185.7577,109.7823],[177.1327,110.1573],[155.4577,111.0573],[150.7327,110.9823],[145.4827,110.0823],[131.0077,110.1573],[105.8827,108.7323],[103.8577,107.7573],[91.4077,105.4323],[87.9577,104.6073],[86.3077,102.5823],[86.1577,96.5823],[86.0827,96.5073],[85.7077,96.5073]]}],"cluster_colors":["#4D96FF","#FF6B6B","#6BCB77","#FFD93D"],"stats":{"total":83,"dirty":53,"oob":8}};
const cv=document.getElementById("cw"),ctx=cv.getContext("2d");
const tt=document.getElementById("tt");
let vp={x:0,y:0,s:1},drag=false,ds={},vs={};
const {xmin,xmax,ymin,ymax}=D.bbox,W=xmax-xmin,H=ymax-ymin;
const CC=D.cluster_colors;

function fitS(){return Math.min((cv.width-16)/W,(cv.height-16)/H)*0.95;}
function fitVP(){const s=fitS();vp={s,x:(cv.width-W*s)/2,y:(cv.height-H*s)/2};}
const tx=x=>vp.x+(x-xmin)*vp.s, ty=y=>vp.y+(ymax-y)*vp.s;

function resize(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;}
const ck=id=>document.getElementById(id).checked;

const RPAL=["#67e8f9","#38bdf8","#818cf8","#a78bfa","#c084fc",
            "#e879f9","#fb7185","#f97316","#eab308","#84cc16",
            "#34d399","#2dd4bf","#60a5fa","#a3e635","#fbbf24"];

// 将 CSS 颜色转 rgba 带透明度
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),
  b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function drawPoly(pts,fill,stroke,lw){
  if(!pts||pts.length<2)return;
  ctx.beginPath();ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));
  for(let i=1;i<pts.length;i++)ctx.lineTo(tx(pts[i][0]),ty(pts[i][1]));
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
}
function drawLine(pts,stroke,lw){
  if(!pts||pts.length<2)return;
  ctx.beginPath();ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));
  for(let i=1;i<pts.length;i++)ctx.lineTo(tx(pts[i][0]),ty(pts[i][1]));
  ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();
}

// hover 命中检测
let hitList=[];
function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  hitList=[];
  const od=ck("c6");

  // 板框
  if(ck("c0")){ctx.save();ctx.setLineDash([]);
    drawPoly(D.board,null,"#4a8abb",1);ctx.restore();}

  // 局部环
  if(ck("c1")){
    ctx.save();ctx.setLineDash([]);
    for(const[cidStr,rings] of Object.entries(D.local_rings)){
      const cid=parseInt(cidStr),col=CC[cid%CC.length];
      rings.forEach((r,i)=>{
        const a=Math.max(0.05,0.4-i*0.008);
        ctx.strokeStyle=rgba(col,a);ctx.lineWidth=0.8;
        if(r.pts&&r.pts.length>1){
          ctx.beginPath();ctx.moveTo(tx(r.pts[0][0]),ty(r.pts[0][1]));
          for(let j=1;j<r.pts.length;j++)ctx.lineTo(tx(r.pts[j][0]),ty(r.pts[j][1]));
          ctx.stroke();}
      });
    }
    ctx.restore();
  }

  // 障碍物
  if(ck("c2")){ctx.save();ctx.setLineDash([]);
    D.obstacles.forEach(o=>drawPoly(o.pts,"rgba(229,57,53,0.18)","rgba(229,57,53,0.5)",0.5));
    ctx.restore();}

  // stubs
  if(ck("c3")){ctx.save();ctx.setLineDash([]);
    D.stubs.forEach(s=>{
      if(od&&s.ok&&s.in_board)return;
      const lc=!s.in_board?"#f87171":!s.ok?"#fb923c":s.col;
      // 连线
      ctx.beginPath();ctx.moveTo(tx(s.cx),ty(s.cy));ctx.lineTo(tx(s.ix),ty(s.iy));
      ctx.strokeStyle=lc;ctx.lineWidth=!s.ok||!s.in_board?1.2:0.9;ctx.stroke();
      // pad 圆
      ctx.beginPath();ctx.arc(tx(s.cx),ty(s.cy),3.5,0,Math.PI*2);
      ctx.fillStyle=s.col;ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=0.5;ctx.stroke();
      // 注入方块
      const ix=tx(s.ix),iy=ty(s.iy);
      ctx.fillStyle=rgba(s.col,0.8);ctx.fillRect(ix-3,iy-3,6,6);
      ctx.strokeStyle="#fff";ctx.lineWidth=0.5;ctx.strokeRect(ix-3,iy-3,6,6);
      // dirty 圆圈
      if(!s.ok||!s.in_board){
        ctx.beginPath();ctx.arc(tx(s.cx),ty(s.cy),7,0,Math.PI*2);
        ctx.strokeStyle=!s.in_board?"#f87171":"#fb923c";
        ctx.lineWidth=1.2;ctx.setLineDash([2.5,2]);ctx.stroke();ctx.setLineDash([]);}
      // 环号
      if(ck("c5")){
        ctx.fillStyle=s.col;ctx.font="8px monospace";
        ctx.fillText(`r${s.ring}`,tx(s.ix)+4,ty(s.iy)+4);}
      hitList.push({type:"stub",x:tx(s.cx),y:ty(s.cy),r:9,tip:
        `net: ${s.net}\nC${s.cluster}  ring: ${s.ring}\n`+
        `inject: (${s.ix},${s.iy})\ndist: ${s.dist}mm\n`+
        (s.ok?(s.in_board?"✓ 正常":"✗ 超出板框"):"✗ 穿越障碍")});
    });
    ctx.restore();
  }

  // A* 路线
  if(ck("c4")&&D.routes){
    ctx.save();ctx.setLineDash([]);
    D.routes.forEach(rt=>{
      if(!rt.pts||rt.pts.length<2)return;
      // 走线 body（宽度按比例）
      const sw=rt.line_w*vp.s;
      ctx.lineWidth=Math.max(1.5,sw);ctx.strokeStyle=rt.color;
      ctx.lineJoin="round";ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(tx(rt.pts[0][0]),ty(rt.pts[0][1]));
      for(let i=1;i<rt.pts.length;i++)ctx.lineTo(tx(rt.pts[i][0]),ty(rt.pts[i][1]));
      ctx.stroke();
      // 中心线（细）
      ctx.lineWidth=0.7;ctx.strokeStyle=rgba(rt.color,0.5);
      ctx.beginPath();ctx.moveTo(tx(rt.pts[0][0]),ty(rt.pts[0][1]));
      for(let i=1;i<rt.pts.length;i++)ctx.lineTo(tx(rt.pts[i][0]),ty(rt.pts[i][1]));
      ctx.stroke();
      // 端点标记
      ctx.fillStyle=rt.color;
      [rt.pts[0],rt.pts[rt.pts.length-1]].forEach(p=>{
        ctx.beginPath();ctx.arc(tx(p[0]),ty(p[1]),4,0,Math.PI*2);ctx.fill();});
    });
    ctx.restore();
    document.getElementById("s4").textContent=D.routes.length+" 条";
  }

  // 统计栏
  document.getElementById("s0").textContent=D.stats.total;
  document.getElementById("s1").textContent=D.stats.total-D.stats.dirty-D.stats.oob;
  document.getElementById("s2").textContent=D.stats.dirty;
}

// 交互
cv.addEventListener("wheel",e=>{
  e.preventDefault();const f=e.deltaY<0?1.13:0.885;
  const rx=e.clientX-cv.getBoundingClientRect().left;
  const ry=e.clientY-cv.getBoundingClientRect().top;
  vp.x=rx-(rx-vp.x)*f;vp.y=ry-(ry-vp.y)*f;vp.s*=f;render();
},{passive:false});
cv.addEventListener("mousedown",e=>{drag=true;cv.style.cursor="grabbing";
  ds={x:e.clientX,y:e.clientY};vs={x:vp.x,y:vp.y};});
window.addEventListener("mousemove",e=>{
  if(drag){vp.x=vs.x+(e.clientX-ds.x);vp.y=vs.y+(e.clientY-ds.y);render();}
  // tooltip
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const hit=hitList.find(h=>Math.hypot(mx-h.x,my-h.y)<h.r);
  if(hit){tt.textContent=hit.tip;tt.style.display="block";
    tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-8)+"px";}
  else tt.style.display="none";
});
window.addEventListener("mouseup",()=>{drag=false;cv.style.cursor="grab";});
document.getElementById("fit").onclick=()=>{fitVP();render();};
["c0","c1","c2","c3","c4","c5","c6"].forEach(id=>document.getElementById(id).onchange=render);
window.addEventListener("resize",()=>{resize();render();});
resize();fitVP();render();
</script></body></html>
