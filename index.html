<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Feasible Area Viewer</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.title{font-size:14px;font-weight:700;color:#3A8FD8}
.sub{font-size:9px;color:var(--text2);margin-top:1px}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.tab{background:#112540;border:1.5px solid var(--border);border-radius:5px;padding:4px 16px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#7AA8CC;transition:all .12s}
.tab:hover{border-color:#3A8FD8;color:#B8D4F0}
.tab[data-l=TOP].active    {background:#8B4020;border-color:#FF8C69;color:#FFB899}
.tab[data-l=ART02].active  {background:#1A3A60;border-color:#69C4FF;color:#B0E4FF}
.tab[data-l=ART03].active  {background:#1A3A20;border-color:#A8FF69;color:#C8FFA0}
.tab[data-l=BOTTOM].active {background:#3A2E10;border-color:#FFD069;color:#FFE8A0}
.controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 18px;display:flex;gap:20px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-group{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);margin-right:2px;text-transform:uppercase;letter-spacing:.04em}
.ck-item{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-size:10px;color:var(--text)}
.ck-item input[type=checkbox]{accent-color:#3A8FD8;width:13px;height:13px;cursor:pointer}
.ck-dot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0}
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:3px 10px;cursor:pointer;font-family:inherit;transition:all .12s}
.zbtn:hover{border-color:#3A8FD8;color:#B0E4FF}
.zoom-val{font-size:9px;color:var(--text2);padding:0 6px;min-width:45px;text-align:center}
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:4px 18px;display:flex;gap:20px;font-size:9px;color:var(--text2);flex-shrink:0}
.infobar span{color:var(--text);font-weight:700}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;max-width:200px;line-height:1.7;z-index:100}
.hint{position:absolute;bottom:8px;right:12px;font-size:8px;color:var(--text2);opacity:.5;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:20px">🔬</span>
  <div>
    <div class="title">PCB Feasible Area Viewer</div>
    <div class="sub">FPC camera ribbon · 145.7 × 20.58 mm · 4-layer · Area-First model</div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" data-l="TOP"    onclick="selLayer('TOP')">TOP</button>
  <button class="tab"        data-l="ART02"  onclick="selLayer('ART02')">ART02</button>
  <button class="tab"        data-l="ART03"  onclick="selLayer('ART03')">ART03</button>
  <button class="tab"        data-l="BOTTOM" onclick="selLayer('BOTTOM')">BOTTOM</button>
</div>
<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">显示组件</span>
    <label class="ck-item">
      <input type="checkbox" id="ck-boundary" checked onchange="toggleVis('boundary',this.checked)">
      <span class="ck-dot" style="background:#2A6090;border:1px solid #4A90B0"></span>板框
    </label>
    <label class="ck-item">
      <input type="checkbox" id="ck-feasible" checked onchange="toggleVis('feasible',this.checked)">
      <span class="ck-dot" id="dot-feasible" style="background:#FF8C69;opacity:.6"></span>可行域
    </label>
    <label class="ck-item">
      <input type="checkbox" id="ck-obstacles" checked onchange="toggleVis('obstacles',this.checked)">
      <span class="ck-dot" style="background:#FF3333;opacity:.75"></span>障碍物
    </label>
    <label class="ck-item">
      <input type="checkbox" id="ck-pins" checked onchange="toggleVis('pins',this.checked)">
      <span class="ck-dot" id="dot-pins" style="background:#FF8C69;border:1px solid rgba(255,255,255,.5)"></span>引脚
    </label>
  </div>
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()" title="fit to screen">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>
<div class="infobar">
  <div>Layer: <span id="i-layer">TOP</span></div>
  <div>Feasible: <span id="i-area">—</span> mm²</div>
  <div>Obstacles: <span id="i-obs">—</span></div>
  <div>Pins: <span id="i-pins">—</span></div>
  <div style="margin-left:auto;opacity:.6">滚轮缩放 · 拖拽平移 · 悬停查看障碍物详情</div>
</div>
<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <g id="root-g">
      <g id="g-bgfill"></g>
      <g id="g-feasible"></g>
      <g id="g-obstacles"></g>
      <g id="g-boundary"></g>
      <g id="g-pins"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll = zoom &nbsp;·&nbsp; Drag = pan &nbsp;·&nbsp; Fit = reset view</div>
</div>

const LCOLOR = {

  ART03:  '#A8FF69', BOTTOM:'#FFD069'
};
const NS = 'http://www.w3.org/2000/svg';
function E(tag, a={}){ const e=document.createElementNS(NS,tag); for(const[k,v] of Object.entries(a)) e.setAttribute(k,v); return e; }

let currentLayer='TOP', visFlags={boundary:true,feasible:true,obstacles:true,pins:true};
let tr={x:0,y:0,k:1}, fitK=1, fitX=0, fitY=0, svgW=800, svgH=400;

const B=PCB.bbox, W=B.xmax-B.xmin, H=B.ymax-B.ymin;
function toSVG(x,y){ return [x-B.xmin, H-(y-B.ymin)]; }
function ptsD(pts){ return pts.map((p,i)=>{const[sx,sy]=toSVG(p[0],p[1]);return`${i?'L':'M'}${sx.toFixed(4)},${sy.toFixed(4)}`}).join('')+'Z'; }

function calcFit(){
  const wrap=document.getElementById('canvas-wrap');
  svgW=wrap.clientWidth; svgH=wrap.clientHeight;
  const pad=28; fitK=Math.min((svgW-pad*2)/W,(svgH-pad*2)/H);
  fitX=(svgW-W*fitK)/2; fitY=(svgH-H*fitK)/2;
}
function applyTransform(){
  document.getElementById('root-g').setAttribute('transform',`translate(${tr.x},${tr.y}) scale(${tr.k})`);
  document.getElementById('zoom-val').textContent=Math.round(tr.k/fitK*100)+'%';
}
function resetView(){ calcFit(); tr={x:fitX,y:fitY,k:fitK}; applyTransform(); }

function clr(id){ const g=document.getElementById(id); while(g.firstChild)g.removeChild(g.firstChild); }

function renderLayer(lName){
  const ld=PCB.layers[lName], col=LCOLOR[lName];
  clr('g-bgfill'); clr('g-feasible'); clr('g-obstacles'); clr('g-boundary'); clr('g-pins');

  // board background
  document.getElementById('g-bgfill').appendChild(E('path',{d:ptsD(PCB.board),fill:'#0E1E30',stroke:'none'}));

  // feasible area
  document.getElementById('g-feasible').appendChild(E('path',{

  }));

  // obstacles
  const gO=document.getElementById('g-obstacles');
  ld.obstacles.forEach((pts,i)=>{

      style:'cursor:crosshair'});
    p.addEventListener('mouseenter',ev=>showTip(ev,lName,i));
    p.addEventListener('mousemove', ev=>moveTip(ev));
    p.addEventListener('mouseleave',hideTip);
    gO.appendChild(p);
  });

  // board boundary (dashed)
  document.getElementById('g-boundary').appendChild(E('path',{
    d:ptsD(PCB.board), fill:'none', stroke:'#3A80B0',
    'stroke-width':(1/tr.k).toFixed(3),

  // pins
  const gP=document.getElementById('g-pins');
  ld.pins.forEach(([cx,cy])=>{

    gP.appendChild(E('circle',{cx:sx.toFixed(4),cy:sy.toFixed(4),r:0.35,

  });

  document.getElementById('i-pins').textContent=ld.n_pins;
  document.getElementById('dot-feasible').style.background=col;
  document.getElementById('dot-pins').style.background=col;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===lName));
  applyVisFlags(); applyTransform();
}

function toggleVis(key,val){ visFlags[key]=val; applyVisFlags(); }

  const m={boundary:'g-boundary',feasible:'g-feasible',obstacles:'g-obstacles',pins:'g-pins'};

  const cx=svgW/2,cy=svgH/2,nk=Math.max(fitK*.2,Math.min(fitK*100,tr.k*f));

}
function zoomAt(cx,cy,f){
  const nk=Math.max(fitK*.2,Math.min(fitK*100,tr.k*f));
  const r=nk/tr.k; tr.x=cx-(cx-tr.x)*r; tr.y=cy-(cy-tr.y)*r; tr.k=nk; applyTransform();
}

// zoom wheel
document.getElementById('canvas-wrap').addEventListener('wheel',e=>{
  e.preventDefault();
  const r=e.currentTarget.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.15:1/1.15);
},{passive:false});

// drag pan
let drag=null;
const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown',e=>{ if(e.button!==0)return; drag={sx:e.clientX-tr.x,sy:e.clientY-tr.y}; wrap.classList.add('dragging'); });
window.addEventListener('mousemove',e=>{ if(!drag)return; tr.x=e.clientX-drag.sx; tr.y=e.clientY-drag.sy; applyTransform(); });
window.addEventListener('mouseup',()=>{ drag=null; wrap.classList.remove('dragging'); });

// tooltip
const TIP=document.getElementById('tooltip');
function showTip(e,lyr,idx){
  TIP.innerHTML=`<b style="color:#FF9999">Obstacle #${idx+1}</b><br>Layer: ${lyr}<br>forbidden zone + clearance`;
  TIP.style.display='block'; moveTip(e);
}
function moveTip(e){
  const r=document.getElementById('canvas-wrap').getBoundingClientRect();
  let tx=e.clientX-r.left+14, ty=e.clientY-r.top-10;
  if(tx+200>svgW) tx-=210;
  TIP.style.left=tx+'px'; TIP.style.top=ty+'px';
}
function hideTip(){ TIP.style.display='none'; }

// responsive
new ResizeObserver(()=>{ calcFit(); resetView(); }).observe(wrap);

// boot
window.addEventListener('DOMContentLoaded',()=>{ calcFit(); tr={x:fitX,y:fitY,k:fitK}; renderLayer('TOP'); });
</script>
</body>
