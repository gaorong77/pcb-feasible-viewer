<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Feasible Area Viewer</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:13px;font-weight:700;color:#3A8FD8}.sub{font-size:9px;color:var(--text2);margin-top:1px}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:5px;align-items:center;flex-shrink:0}
.tab{background:#112540;border:1.5px solid var(--border);border-radius:5px;padding:3px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#7AA8CC;transition:all .12s}
.tab:hover{border-color:#3A8FD8;color:#B8D4F0}
.tab[data-l=TOP].active    {background:#8B4020;border-color:#FF8C69;color:#FFB899}
.tab[data-l=ART02].active  {background:#1A3A60;border-color:#69C4FF;color:#B0E4FF}
.tab[data-l=ART03].active  {background:#1A3A20;border-color:#A8FF69;color:#C8FFA0}
.tab[data-l=BOTTOM].active {background:#3A2E10;border-color:#FFD069;color:#FFE8A0}
/* controls */
.controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;gap:16px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;color:var(--text)}
.ck-item input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.ck-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* net selector */
.net-wrap{display:flex;align-items:center;gap:7px}
#net-sel{background:#0A1825;border:1.5px solid var(--border);border-radius:4px;
  color:var(--text);font-family:inherit;font-size:10px;padding:3px 7px;
  cursor:pointer;max-width:240px;outline:none}
#net-sel:focus{border-color:#3A8FD8}
#net-sel option{background:#0D1E30}
.legend-row{display:flex;gap:12px;align-items:center;font-size:9px;color:var(--text2);margin-left:4px}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:9px;height:9px;border-radius:2px}
/* zoom */
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit;transition:all .12s}
.zbtn:hover{border-color:#3A8FD8;color:#B0E4FF}
.zoom-val{font-size:9px;color:var(--text2);padding:0 5px;min-width:42px;text-align:center}
/* infobar */
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:3px 16px;
  display:flex;gap:18px;font-size:9px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.infobar span{color:var(--text);font-weight:700}
/* canvas */
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
/* tooltip */
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;
  padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;
  max-width:220px;line-height:1.8}
.hint{position:absolute;bottom:7px;right:10px;font-size:8px;color:var(--text2);opacity:.45;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:19px">🔬</span>
  <div><div class="title">PCB Feasible Area Viewer</div>
  <div class="sub">FPC camera ribbon · 145.7×20.58 mm · 4-layer · Area-First model</div></div>
</header>

<div class="tabs">
  <button class="tab active" data-l="TOP"    onclick="selLayer('TOP')">TOP</button>
  <button class="tab"        data-l="ART02"  onclick="selLayer('ART02')">ART02</button>
  <button class="tab"        data-l="ART03"  onclick="selLayer('ART03')">ART03</button>
  <button class="tab"        data-l="BOTTOM" onclick="selLayer('BOTTOM')">BOTTOM</button>
</div>

<div class="controls">
  <!-- visibility toggles -->
  <span class="ctrl-label">显示</span>
  <label class="ck-item"><input type="checkbox" id="ck-boundary" checked onchange="toggleVis('boundary',this.checked)">
    <span class="ck-dot" style="background:#2A6090;border:1px solid #4A90B0"></span>板框</label>
  <label class="ck-item"><input type="checkbox" id="ck-feasible" checked onchange="toggleVis('feasible',this.checked)">
    <span class="ck-dot" id="dot-feasible" style="background:#FF8C69;opacity:.55"></span>可行域</label>
  <label class="ck-item"><input type="checkbox" id="ck-obstacles" checked onchange="toggleVis('obstacles',this.checked)">
    <span class="ck-dot" style="background:#FF3333;opacity:.75"></span>障碍物</label>
  <label class="ck-item"><input type="checkbox" id="ck-pins" checked onchange="toggleVis('pins',this.checked)">
    <span class="ck-dot" id="dot-pins" style="background:#FF8C69;border:1px solid rgba(255,255,255,.4)"></span>引脚</label>

  <!-- net selector -->
  <div class="net-wrap">
    <span class="ctrl-label">当前布线 Net</span>
    <select id="net-sel" onchange="selNet(this.value)">
      <option value="">— 不选择（全部障碍物显示为红色）—</option>
    </select>
  </div>

  <!-- legend -->
  <div class="legend-row">
    <div class="leg"><span class="leg-dot" style="background:#FF3333;opacity:.75"></span>他网 pad（障碍）</div>
    <div class="leg"><span class="leg-dot" style="background:#00DD88"></span>本网 pad（目标）</div>
  </div>

  <!-- zoom -->
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>

<div class="infobar">
  <div>Layer: <span id="i-layer">TOP</span></div>
  <div>Feasible: <span id="i-area">—</span> mm²</div>
  <div>Obstacles: <span id="i-obs">—</span></div>
  <div>Pins: <span id="i-pins">—</span></div>
  <div>Net: <span id="i-net" style="color:#00DD88">（未选择）</span></div>
  <div style="margin-left:auto;opacity:.5">滚轮缩放 · 拖拽平移 · 选择 Net 高亮路由目标</div>
</div>

<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <g id="root-g">
      <g id="g-bgfill"></g>
      <g id="g-feasible"></g>
      <g id="g-obstacles"></g>
      <g id="g-boundary"></g>
      <g id="g-pins"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll=zoom · Drag=pan · Fit=reset</div>
</div>

  ld.obstacles.forEach((obs,i)=>{
    const isTarget = currentNet && obs.net===currentNet;
    const fillColor  = isTarget ? '#00DD88' : '#FF3333';
    const fillOpacity= isTarget ? '0.55'    : '0.70';
    const strokeColor= isTarget ? '#00FF99' : '#FF6666';
    const p=E('path',{
      d:ptsD(obs.pts),fill:fillColor,'fill-opacity':fillOpacity,
      stroke:strokeColor,'stroke-width':(0.4/tr.k).toFixed(3),'stroke-opacity':'0.7',
      style:'cursor:crosshair'
    });
    p.addEventListener('mouseenter',ev=>showTip(ev,obs,isTarget));
    p.addEventListener('mousemove', ev=>moveTip(ev));
    p.addEventListener('mouseleave',hideTip);
    gO.appendChild(p);
  });

  // board boundary
  document.getElementById('g-boundary').appendChild(E('path',{
    d:ptsD(PCB.board),fill:'none',stroke:'#3A80B0',
    'stroke-width':(1/tr.k).toFixed(3),
    'stroke-dasharray':`${3/tr.k} ${2/tr.k}`
  }));

  // pins
  const gP=document.getElementById('g-pins');
  ld.pins.forEach(pin=>{
    const[sx,sy]=toSVG(pin.x,pin.y);
    const isTarget = currentNet && pin.net===currentNet;
    const c=E('circle',{
      cx:sx.toFixed(3),cy:sy.toFixed(3),r:0.35,
      fill: isTarget?'#00FF99':col,
      stroke:'white','stroke-width':'0.07','fill-opacity':'0.9'
    });
    gP.appendChild(c);
  });

  // update info bar
  const nObs=ld.obstacles.length, nTarget=currentNet?ld.obstacles.filter(o=>o.net===currentNet).length:0;
  document.getElementById('i-layer').textContent=lName;
  document.getElementById('i-area').textContent=ld.area_mm2;
  document.getElementById('i-obs').textContent= currentNet
    ? `${nObs-nTarget} 障碍 + ${nTarget} 目标` : nObs;
  document.getElementById('i-pins').textContent=ld.pins.length;
  document.getElementById('i-net').textContent=currentNet||'（未选择）';
  document.getElementById('dot-feasible').style.background=col;
  document.getElementById('dot-pins').style.background=col;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===lName));
  applyVisFlags();applyTransform();
}

function toggleVis(key,val){visFlags[key]=val;applyVisFlags();}
function applyVisFlags(){
  const m={boundary:'g-boundary',feasible:'g-feasible',obstacles:'g-obstacles',pins:'g-pins'};
  for(const[k,gid]of Object.entries(m))document.getElementById(gid).style.display=visFlags[k]?'':'none';
}
function selLayer(n){currentLayer=n;renderLayer(n);}
function selNet(n){currentNet=n;renderLayer(currentLayer);}

function zoomStep(f){const cx=svgW/2,cy=svgH/2;zoomAt(cx,cy,f);}
function zoomAt(cx,cy,f){
  const nk=Math.max(fitK*.2,Math.min(fitK*100,tr.k*f));
  const r=nk/tr.k;tr.x=cx-(cx-tr.x)*r;tr.y=cy-(cy-tr.y)*r;tr.k=nk;applyTransform();
}

// wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel',e=>{
  e.preventDefault();
  const r=e.currentTarget.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);
},{passive:false});

// drag pan
let drag=null;
const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown',e=>{if(e.button!==0)return;drag={sx:e.clientX-tr.x,sy:e.clientY-tr.y};wrap.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(!drag)return;tr.x=e.clientX-drag.sx;tr.y=e.clientY-drag.sy;applyTransform();});
window.addEventListener('mouseup',()=>{drag=null;wrap.classList.remove('dragging');});

// tooltip
const TIP=document.getElementById('tooltip');
function showTip(e,obs,isTarget){
  const role=isTarget?'<span style="color:#00FF99">▶ 本网目标 pad（非障碍）</span>':'<span style="color:#FF6666">✖ 他网障碍物</span>';
  TIP.innerHTML=`${role}<br>Net: <b>${obs.net||'—'}</b><br>Ref: ${obs.refdes} · Pin ${obs.pin}<br>Via: ${obs.is_via}`;
  TIP.style.display='block';moveTip(e);
}
function moveTip(e){
  const r=document.getElementById('canvas-wrap').getBoundingClientRect();
  let tx=e.clientX-r.left+14,ty=e.clientY-r.top-10;
  if(tx+230>svgW)tx-=240;
  TIP.style.left=tx+'px';TIP.style.top=ty+'px';
}
function hideTip(){TIP.style.display='none';}

new ResizeObserver(()=>{calcFit();resetView();}).observe(wrap);
window.addEventListener('DOMContentLoaded',()=>{calcFit();tr={x:fitX,y:fitY,k:fitK};renderLayer('TOP');});
</script>
</body>
