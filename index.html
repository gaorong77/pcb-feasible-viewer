<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Feasible Area Viewer</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:13px;font-weight:700;color:#3A8FD8}.sub{font-size:9px;color:var(--text2);margin-top:1px}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:5px;align-items:center;flex-shrink:0}
.tab{background:#112540;border:1.5px solid var(--border);border-radius:5px;padding:3px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#7AA8CC;transition:all .12s}
.tab:hover{border-color:#3A8FD8}
.tab[data-l=TOP].active{background:#8B4020;border-color:#FF8C69;color:#FFB899}
.tab[data-l=ART02].active{background:#1A3A60;border-color:#69C4FF;color:#B0E4FF}
.tab[data-l=ART03].active{background:#1A3A20;border-color:#A8FF69;color:#C8FFA0}
.tab[data-l=BOTTOM].active{background:#3A2E10;border-color:#FFD069;color:#FFE8A0}
.ctrl-row{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;gap:12px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sep{width:1px;background:var(--border);height:14px;flex-shrink:0}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;color:var(--text)}
.ck-item input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.ck-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.slot-legend{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--text2)}
.sl-dot{width:7px;height:7px;border-radius:1px}
.net-wrap{display:flex;align-items:center;gap:6px}
#net-sel{background:#0A1825;border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:10px;padding:2px 6px;cursor:pointer;max-width:210px;outline:none}
#net-sel option{background:#0D1E30}
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit;transition:all .12s}
.zbtn:hover{border-color:#3A8FD8;color:#B0E4FF}
.zoom-val{font-size:9px;color:var(--text2);padding:0 5px;min-width:42px;text-align:center}
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:3px 16px;display:flex;gap:14px;font-size:9px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.infobar span{color:var(--text);font-weight:700}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;max-width:240px;line-height:1.8}
.hint{position:absolute;bottom:7px;right:10px;font-size:8px;color:var(--text2);opacity:.4;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:19px">🔬</span>
  <div><div class="title">PCB Feasible Area Viewer</div>
  <div class="sub">FPC camera ribbon · 145.7×20.58 mm · 4-layer · Area-First · DBSCAN fanout zones</div></div>
</header>
<div class="tabs">
  <button class="tab active" data-l="TOP"    onclick="selLayer('TOP')">TOP</button>
  <button class="tab"        data-l="ART02"  onclick="selLayer('ART02')">ART02</button>
  <button class="tab"        data-l="ART03"  onclick="selLayer('ART03')">ART03</button>
  <button class="tab"        data-l="BOTTOM" onclick="selLayer('BOTTOM')">BOTTOM</button>
</div>
<div class="ctrl-row">
  <span class="ctrl-label">显示</span>
  <label class="ck-item"><input type="checkbox" id="ck-boundary" checked onchange="toggleVis('boundary',this.checked)">
    <span class="ck-dot" style="background:#2A6090;border:1px solid #4A90B0"></span>板框</label>
  <label class="ck-item"><input type="checkbox" id="ck-feasible" checked onchange="toggleVis('feasible',this.checked)">
    <span class="ck-dot" id="dot-feasible" style="background:#FF8C69;opacity:.5"></span>可行域</label>
  <label class="ck-item"><input type="checkbox" id="ck-fanout" checked onchange="toggleVis('fanout',this.checked)">
    <span class="ck-dot" style="background:#00FF99;opacity:.5;border:1px solid #00EE88"></span>扇出区</label>
  <label class="ck-item"><input type="checkbox" id="ck-slots" checked onchange="toggleVis('slots',this.checked)">
    <span class="ck-dot" style="background:#FF8C42;opacity:.8"></span>线槽</label>
  <label class="ck-item"><input type="checkbox" id="ck-slotlabels" checked onchange="toggleVis('slotlabels',this.checked)">
    <span class="ck-dot" style="background:#B8D4F0;opacity:.6"></span>槽号</label>
  <label class="ck-item"><input type="checkbox" id="ck-obstacles" checked onchange="toggleVis('obstacles',this.checked)">
    <span class="ck-dot" style="background:#FF3333;opacity:.75"></span>障碍物</label>
  <label class="ck-item"><input type="checkbox" id="ck-pins" checked onchange="toggleVis('pins',this.checked)">
    <span class="ck-dot" id="dot-pins" style="background:#FF8C69;border:1px solid rgba(255,255,255,.4)"></span>引脚</label>
  <div class="sep"></div>
  <div class="slot-legend" id="slot-legend-wrap"><span style="color:var(--text2)">Slot:</span></div>
  <div class="sep"></div>
  <div class="net-wrap">
    <span class="ctrl-label">Net</span>
    <select id="net-sel" onchange="selNet(this.value)"><option value="">— 全部 —</option></select>
  </div>
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>
<div class="infobar">
  <div>Layer: <span id="i-layer">—</span></div>
  <div>Feasible: <span id="i-area">—</span> mm²</div>
  <div>Slots: <span id="i-slots">—</span></div>
  <div>扇出簇: <span id="i-fanout">—</span></div>
  <div>Obstacles: <span id="i-obs">—</span></div>
  <div>Net: <span id="i-net" style="color:#00DD88">—</span></div>
  <div style="margin-left:auto;opacity:.5">DBSCAN eps=2mm · pad forbidden_zone 凸包 · 悬停查看簇内 nets</div>
</div>
<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <g id="root-g">
      <g id="g-bgfill"></g>
      <g id="g-feasible"></g>
      <g id="g-fanout"></g>
      <g id="g-slots"></g>
      <g id="g-slotlabels"></g>
      <g id="g-obstacles"></g>
      <g id="g-boundary"></g>
      <g id="g-pins"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll=zoom · Drag=pan · Fit=reset</div>
</div>

const SLOT_COLORS=["#FF6B35","#FF8C42","#FFA94D","#FFCA3A","#A8E063","#56CFE1","#48BFE3","#4EA8DE","#5390D9","#6930C3","#7400B8","#9D4EDD","#C77DFF","#E0AAFF"];
const FANOUT_COLORS=["#00FF99","#00DDFF","#FFFF55","#FF88FF","#88FFAA","#66CCFF"];
const LCOLOR={TOP:'#FF8C69',ART02:'#69C4FF',ART03:'#A8FF69',BOTTOM:'#FFD069'};
const NS='http://www.w3.org/2000/svg';
function E(tag,a={}){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}

let currentLayer='TOP',currentNet='';
let vis={boundary:true,feasible:true,fanout:true,slots:true,slotlabels:true,obstacles:true,pins:true};
let tr={x:0,y:0,k:1},fitK=1,fitX=0,fitY=0,svgW=800,svgH=400;
const B=PCB.bbox,W=B.xmax-B.xmin,H=B.ymax-B.ymin;
function toSVG(x,y){return[x-B.xmin,H-(y-B.ymin)];}
function ptsD(pts){return pts.map((p,i)=>{const[sx,sy]=toSVG(p[0],p[1]);return`${i?'L':'M'}${sx.toFixed(3)},${sy.toFixed(3)}`}).join('')+'Z';}

(function(){const s=document.getElementById('net-sel');PCB.all_nets.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});})();
(function(){const w=document.getElementById('slot-legend-wrap');SLOT_COLORS.forEach((c,i)=>{const d=document.createElement('span');d.className='sl-dot';d.style.background=c;d.title=`Slot ${i+1}`;w.appendChild(d);});const l=document.createElement('span');l.textContent=` 1→${SLOT_COLORS.length}`;l.style.color='var(--text2)';w.appendChild(l);})();

function calcFit(){const w=document.getElementById('canvas-wrap');svgW=w.clientWidth;svgH=w.clientHeight;const p=28;fitK=Math.min((svgW-p*2)/W,(svgH-p*2)/H);fitX=(svgW-W*fitK)/2;fitY=(svgH-H*fitK)/2;}
function applyTransform(){document.getElementById('root-g').setAttribute('transform',`translate(${tr.x},${tr.y}) scale(${tr.k})`);document.getElementById('zoom-val').textContent=Math.round(tr.k/fitK*100)+'%';}
function resetView(){calcFit();tr={x:fitX,y:fitY,k:fitK};applyTransform();}
function clr(id){const g=document.getElementById(id);while(g.firstChild)g.removeChild(g.firstChild);}

function renderLayer(lName){
  const ld=PCB.layers[lName],col=LCOLOR[lName];
  ['g-bgfill','g-feasible','g-fanout','g-slots','g-slotlabels','g-obstacles','g-boundary','g-pins'].forEach(clr);

  document.getElementById('g-bgfill').appendChild(E('path',{d:ptsD(PCB.board),fill:'#0E1E30',stroke:'none'}));
  document.getElementById('g-feasible').appendChild(E('path',{
    d:ptsD(ld.feasible),fill:col,'fill-opacity':'0.10',
    stroke:col,'stroke-width':(0.8/tr.k).toFixed(3),'stroke-opacity':'0.45'}));

  // ── 扇出区 (DBSCAN 簇) ──────────────────────────────────────────────────
  const gF=document.getElementById('g-fanout');
  const zones=PCB.fanout[lName]||[];
  zones.forEach(z=>{
    const fc=FANOUT_COLORS[z.label%FANOUT_COLORS.length];
    // 当 Net 已选中时：检查该簇是否包含该 net
    const hasNet=currentNet?z.nets.includes(currentNet):false;
    const fop=currentNet?(hasNet?'0.55':'0.07'):'0.28';
    const sop=currentNet?(hasNet?'0.90':'0.15'):'0.75';
    const sw=(0.8/tr.k).toFixed(3);
    const p=E('path',{d:ptsD(z.coords),fill:fc,'fill-opacity':fop,
      stroke:fc,'stroke-width':sw,'stroke-opacity':sop,
      'stroke-dasharray':`${1.5/tr.k} ${1/tr.k}`,style:'cursor:crosshair'});
    p.addEventListener('mouseenter',ev=>showFanoutTip(ev,z,fc));
    p.addEventListener('mousemove', ev=>moveTip(ev));
    p.addEventListener('mouseleave',hideTip);
    gF.appendChild(p);
    // 簇编号 label
    const xs=z.coords.map(c=>c[0]),ys=z.coords.map(c=>c[1]);
    const cx=xs.reduce((a,b)=>a+b,0)/xs.length, cy=ys.reduce((a,b)=>a+b,0)/ys.length;
    const[lsx,lsy]=toSVG(cx,cy);
    const fs=Math.min(1.2, 8/tr.k);
    const t=E('text',{x:lsx.toFixed(2),y:lsy.toFixed(2),
      'font-size':fs.toFixed(3),fill:fc,'fill-opacity': currentNet?(hasNet?'0.9':'0.2'):'0.8',
      'text-anchor':'middle','dominant-baseline':'middle',
      'pointer-events':'none','font-family':'monospace','font-weight':'bold'});
    t.textContent=`C${z.label}`;
    gF.appendChild(t);
  });

  // 线槽
  const gS=document.getElementById('g-slots'),gL=document.getElementById('g-slotlabels');
  (PCB.corridors[lName]||[]).forEach(ring=>{
    const sc=SLOT_COLORS[(ring.slot-1)%SLOT_COLORS.length];
    const p=E('path',{d:ptsD(ring.coords),fill:sc,'fill-opacity':'0.22',
      stroke:sc,'stroke-width':(0.6/tr.k).toFixed(3),'stroke-opacity':'0.70',style:'cursor:crosshair'});
    p.addEventListener('mouseenter',ev=>showSlotTip(ev,ring,sc));
    p.addEventListener('mousemove', ev=>moveTip(ev));
    p.addEventListener('mouseleave',hideTip);
    gS.appendChild(p);
    const xs=ring.coords.map(c=>c[0]),ys=ring.coords.map(c=>c[1]);
    const[lsx,lsy]=toSVG(Math.max(...xs)-1.2,ys.reduce((a,b)=>a+b,0)/ys.length);
    const t=E('text',{x:lsx.toFixed(2),y:lsy.toFixed(2),'font-size':(9/tr.k).toFixed(2),
      fill:sc,'fill-opacity':'0.9','text-anchor':'middle','dominant-baseline':'middle',
      'pointer-events':'none','font-family':'monospace','font-weight':'bold'});
    t.textContent=ring.slot; gL.appendChild(t);
  });

  // 障碍物
  const gO=document.getElementById('g-obstacles');
  ld.obstacles.forEach(obs=>{
    const isTgt=currentNet&&obs.net===currentNet;
    const p=E('path',{d:ptsD(obs.pts),fill:isTgt?'#00DD88':'#FF3333',
      'fill-opacity':isTgt?'0.55':'0.70',stroke:isTgt?'#00FF99':'#FF6666',
      'stroke-width':(0.4/tr.k).toFixed(3),'stroke-opacity':'0.7',style:'cursor:crosshair'});
    p.addEventListener('mouseenter',ev=>showObsTip(ev,obs,isTgt));
    p.addEventListener('mousemove', ev=>moveTip(ev));
    p.addEventListener('mouseleave',hideTip);
    gO.appendChild(p);
  });

  document.getElementById('g-boundary').appendChild(E('path',{
    d:ptsD(PCB.board),fill:'none',stroke:'#3A80B0',
    'stroke-width':(1/tr.k).toFixed(3),'stroke-dasharray':`${3/tr.k} ${2/tr.k}`}));

  const gP=document.getElementById('g-pins');
  ld.pins.forEach(pin=>{
    const[sx,sy]=toSVG(pin.x,pin.y);const isTgt=currentNet&&pin.net===currentNet;
    gP.appendChild(E('circle',{cx:sx.toFixed(3),cy:sy.toFixed(3),r:0.35,
      fill:isTgt?'#00FF99':col,stroke:'white','stroke-width':'0.07','fill-opacity':'0.9'}));
  });

  const nObs=ld.obstacles.length,nTgt=currentNet?ld.obstacles.filter(o=>o.net===currentNet).length:0;
  document.getElementById('i-layer').textContent=lName;
  document.getElementById('i-area').textContent=ld.area_mm2;
  document.getElementById('i-slots').textContent=(PCB.corridors[lName]||[]).length;
  document.getElementById('i-fanout').textContent=zones.length?`${zones.length}个簇`:'—';
  document.getElementById('i-obs').textContent=currentNet?`${nObs-nTgt}障+${nTgt}目标`:nObs;
  document.getElementById('i-net').textContent=currentNet||'—';
  document.getElementById('dot-feasible').style.background=col;
  document.getElementById('dot-pins').style.background=col;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===lName));
  applyVisFlags();applyTransform();
}

function toggleVis(k,v){vis[k]=v;applyVisFlags();}
function applyVisFlags(){
  const m={boundary:'g-boundary',feasible:'g-feasible',fanout:'g-fanout',
           slots:'g-slots',slotlabels:'g-slotlabels',obstacles:'g-obstacles',pins:'g-pins'};
  for(const[k,gid]of Object.entries(m))document.getElementById(gid).style.display=vis[k]?'':'none';
}
function selLayer(n){currentLayer=n;renderLayer(n);}
function selNet(n){currentNet=n;renderLayer(currentLayer);}
function zoomStep(f){zoomAt(svgW/2,svgH/2,f);}
function zoomAt(cx,cy,f){
  const nk=Math.max(fitK*.2,Math.min(fitK*100,tr.k*f));
  const r=nk/tr.k;tr.x=cx-(cx-tr.x)*r;tr.y=cy-(cy-tr.y)*r;tr.k=nk;applyTransform();
}
document.getElementById('canvas-wrap').addEventListener('wheel',e=>{
  e.preventDefault();const r=e.currentTarget.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);
},{passive:false});
let drag=null;const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown',e=>{if(e.button!==0)return;drag={sx:e.clientX-tr.x,sy:e.clientY-tr.y};wrap.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(!drag)return;tr.x=e.clientX-drag.sx;tr.y=e.clientY-drag.sy;applyTransform();});
window.addEventListener('mouseup',()=>{drag=null;wrap.classList.remove('dragging');});
const TIP=document.getElementById('tooltip');
function showFanoutTip(e,z,col){
  const netStr=z.nets.slice(0,6).join('<br>  ')+(z.nets.length>6?`<br>  …+${z.nets.length-6}个`:'');
  TIP.innerHTML=`<b style="color:${col}">扇出簇 C${z.label}</b> · ${z.n_pins} pads<br><span style="color:var(--text2)">包含 nets:</span><br>  ${netStr}`;
  TIP.style.display='block';moveTip(e);
}
function showSlotTip(e,ring,col){TIP.innerHTML=`<b style="color:${col}">Slot #${ring.slot}</b><br>d = ${ring.d} mm 距板框`;TIP.style.display='block';moveTip(e);}
function showObsTip(e,obs,isTgt){
  const role=isTgt?'<span style="color:#00FF99">▶ 本网目标</span>':'<span style="color:#FF6666">✖ 他网障碍</span>';
  TIP.innerHTML=`${role}<br>Net: <b>${obs.net||'—'}</b><br>${obs.refdes} · Pin ${obs.pin}`;
  TIP.style.display='block';moveTip(e);
}
function moveTip(e){const r=document.getElementById('canvas-wrap').getBoundingClientRect();let tx=e.clientX-r.left+14,ty=e.clientY-r.top-10;if(tx+250>svgW)tx-=260;TIP.style.left=tx+'px';TIP.style.top=ty+'px';}
function hideTip(){TIP.style.display='none';}
new ResizeObserver(()=>{calcFit();resetView();}).observe(wrap);
window.addEventListener('DOMContentLoaded',()=>{calcFit();tr={x:fitX,y:fitY,k:fitK};renderLayer('TOP');});
</script>
</body>
