let vp={x:0,y:0,s:1},drag=false,ds={},vs={};
const svg=document.getElementById("svg"),
      cw=document.getElementById("cw"),
      tt=document.getElementById("tt");
const {xmin,xmax,ymin,ymax}=D.bbox,W=xmax-xmin,H=ymax-ymin;
const NS="http://www.w3.org/2000/svg";

function fitS(){const r=cw.getBoundingClientRect();
  return Math.min((r.width-16)/W,(r.height-16)/H)*0.95;}
function fitVP(){const r=cw.getBoundingClientRect(),s=fitS();
  vp={s,x:(r.width-W*s)/2,y:(r.height-H*s)/2};}
const tx=x=>vp.x+(x-xmin)*vp.s, ty=y=>vp.y+(ymax-y)*vp.s;
const pp=pts=>pts.map(([x,y])=>`${tx(x)},${ty(y)}`).join(" ");

function el(t,a,p){const n=document.createElementNS(NS,t);
  for(const[k,v]of Object.entries(a))n.setAttribute(k,v);p&&p.appendChild(n);return n;}

let gBd,gRi,gOb,gSt,gLb;
function initSVG(){
  svg.innerHTML="";const r=cw.getBoundingClientRect();
  svg.setAttribute("width",r.width);svg.setAttribute("height",r.height);
  gBd=el("g",{},svg);gRi=el("g",{},svg);gOb=el("g",{},svg);
  gSt=el("g",{},svg);gLb=el("g",{},svg);
}
function clrG(){[gBd,gRi,gOb,gSt,gLb].forEach(g=>{while(g.firstChild)g.removeChild(g.firstChild);});}
const ck=id=>document.getElementById(id).checked;

// 簇颜色（局部环用淡色）
const CC=D.cluster_colors;
function cluAlpha(cid,a){
  const c=CC[cid%CC.length];
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function render(){
  const r=cw.getBoundingClientRect();
  svg.setAttribute("width",r.width);svg.setAttribute("height",r.height);
  clrG();
  const onlyDirty = ck("c6");

  // 板框
  if(ck("c0"))
    el("polygon",{points:pp(D.board),fill:"none",stroke:"#4a8abb",
      "stroke-width":"1","vector-effect":"non-scaling-stroke"},gBd);

  // 局部环（按簇着色，透明度低）
  if(ck("c1")){
    for(const[cidStr,rings] of Object.entries(D.local_rings)){
      const cid=parseInt(cidStr);
      rings.forEach((r,i)=>{
        // 环深度越大越淡
        const alpha=Math.max(0.08, 0.45-i*0.009);
        const pts=r.pts.map(([x,y])=>`${tx(x)},${ty(y)}`).join(" ");
        el("polyline",{points:pts,fill:"none",
          stroke:CC[cid%CC.length],"stroke-opacity":alpha.toFixed(2),
          "stroke-width":"0.7","vector-effect":"non-scaling-stroke"},gRi);
      });
    }
  }

  // 障碍物（pad 禁区）
  if(ck("c2"))
    D.obstacles.forEach(o=>{
      el("polygon",{points:pp(o.pts),fill:"#e53935","fill-opacity":"0.2",
        stroke:"#e53935","stroke-width":"0.35","vector-effect":"non-scaling-stroke"},gOb);
    });

  // stubs
  if(ck("c3")){
    D.stubs.forEach(s=>{
      if(onlyDirty && s.ok && s.in_board) return;
      const px=tx(s.cx),py=ty(s.cy),ix=tx(s.ix),iy=ty(s.iy);
      const lc = !s.in_board?"#f87171": !s.ok?"#fb923c": s.col;
      const sw  = !s.ok||!s.in_board?"1.1":"0.85";

      // stub 线
      el("line",{x1:px,y1:py,x2:ix,y2:iy,stroke:lc,"stroke-width":sw,
        "stroke-opacity":"0.9","vector-effect":"non-scaling-stroke"},gSt);

      // pad 圆点
      el("circle",{cx:px,cy:py,r:"3.5",fill:s.col,
        "fill-opacity":"0.95",stroke:"#fff","stroke-width":"0.5"},gSt);

      // 注入点方块
      el("rect",{x:ix-3,y:iy-3,width:"6",height:"6",fill:s.col,
        "fill-opacity":"0.75",stroke:"#fff","stroke-width":"0.5",
        "vector-effect":"non-scaling-stroke"},gSt);

      // dirty 标记
      if(ck("c5") && (!s.ok||!s.in_board)){
        const bc=!s.in_board?"#f87171":"#fb923c";
        el("circle",{cx:px,cy:py,r:"7",fill:"none",stroke:bc,
          "stroke-width":"1.2","stroke-dasharray":"2.5,2",
          "vector-effect":"non-scaling-stroke"},gSt);
      }

      // hover 命中区
      const hit=el("circle",{cx:px,cy:py,r:"9",fill:"transparent",cursor:"pointer"},gSt);
      hit.dataset.tip=`net: ${s.net}\nC${s.cluster}  ring: ${s.ring}  depth: ${s.ring}\n注入点: (${s.ix}, ${s.iy})\ndist: ${s.dist}mm\n${s.ok?(s.in_board?"✓ 正常":"✗ 超出板框"):"✗ 穿越障碍"}`;
      hit.addEventListener("mouseenter",e=>{tt.style.display="block";});
      hit.addEventListener("mouseleave",()=>{tt.style.display="none";});
      hit.addEventListener("mousemove",e=>{
        tt.textContent=e.target.dataset.tip||"";
        tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-8)+"px";
      });
    });
  }

  // 环号标注（在注入点旁）
  if(ck("c4")){
    D.stubs.forEach(s=>{
      if(onlyDirty && s.ok && s.in_board) return;
      el("text",{x:tx(s.ix)+5,y:ty(s.iy)+4,fill:s.col,"font-size":"8.5",
        "font-family":"monospace","stroke":"#07111F","stroke-width":"2",
        "paint-order":"stroke"},gLb).textContent=`r${s.ring}`;
    });
  }

  // 信息栏
  document.getElementById("s0").textContent=D.stats.total;
  document.getElementById("s1").textContent=D.stats.total-D.stats.dirty-D.stats.oob;
  document.getElementById("s2").textContent=D.stats.dirty;
  document.getElementById("s3").textContent=D.stats.oob;
}

// 交互
cw.addEventListener("wheel",e=>{
  e.preventDefault();const f=e.deltaY<0?1.13:0.885;
  const r=cw.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  vp.x=cx-(cx-vp.x)*f;vp.y=cy-(cy-vp.y)*f;vp.s*=f;render();
},{passive:false});
cw.addEventListener("mousedown",e=>{
  drag=true;cw.classList.add("drag");
  ds={x:e.clientX,y:e.clientY};vs={x:vp.x,y:vp.y};});
window.addEventListener("mousemove",e=>{
  if(!drag)return;vp.x=vs.x+(e.clientX-ds.x);vp.y=vs.y+(e.clientY-ds.y);render();});
window.addEventListener("mouseup",()=>{drag=false;cw.classList.remove("drag");});
document.getElementById("fit").onclick=()=>{fitVP();render();};
["c0","c1","c2","c3","c4","c5","c6"].forEach(id=>
  document.getElementById(id).onchange=render);
window.addEventListener("resize",()=>{fitVP();initSVG();render();});
initSVG();fitVP();render();
</script></body></html>
